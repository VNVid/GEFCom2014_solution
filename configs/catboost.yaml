data:
  model_data_dir: artifacts/model_data/validation

model:
  # Runtime-representative benchmark setting; this is not a selected model.
  iterations: 500
  depth: 6
  learning_rate: 0.03
  l2_leaf_reg: 3.0
  random_seed: 42
  thread_count: -1

benchmark:
  origin: "2009-01-01"

search:
  split: validation
  reference_model: seasonal_empirical
  baseline_fold_metrics: artifacts/baseline/validation/fold_metrics.csv
  common_parameters:
    random_seed: 42
    thread_count: -1
  l2_leaf_reg: 5.0
  depths: [4, 6, 8]
  schedules:
    - learning_rate: 0.04
      max_iterations: 500
      iteration_counts: [250, 375, 500]
    - learning_rate: 0.08
      max_iterations: 250
      iteration_counts: [125, 188, 250]
  training_log_period: 100
  alert_after_folds: 3
  alert_relative_degradation: 0.25

outputs:
  root_dir: artifacts/catboost/benchmark
  search_root_dir: artifacts/catboost/search/phase1
