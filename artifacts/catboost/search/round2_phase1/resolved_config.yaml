backtest:
  data:
    load_dir: data/GEFCom2014-L_V2/Load
  backtest:
    default_split: validation
    splits:
      validation:
        start: '2009-01-01'
        end: '2011-01-01'
      round2_validation:
        start: '2010-01-01'
        end: '2011-01-01'
      test:
        start: '2011-01-01'
        end: '2012-01-01'
  evaluation:
    quantiles:
      start: 0.01
      stop: 0.99
      step: 0.01
    central_intervals:
    - 0.5
    - 0.8
    - 0.9
    - 0.98
catboost:
  data:
    model_data_dir: artifacts/model_data/round2_validation
    selected_features_path: artifacts/catboost/feature_selection/round2/selected_features.yaml
  search:
    split: round2_validation
    reference_model: seasonal_empirical
    baseline_fold_metrics: artifacts/baseline/validation/fold_metrics.csv
    common_parameters:
      random_seed: 42
      thread_count: -1
    l2_leaf_regs:
    - 1.0
    - 5.0
    - 20.0
    depths:
    - 3
    - 4
    - 5
    schedules:
    - learning_rate: 0.08
      max_iterations: 125
      iteration_counts:
      - 75
      - 100
      - 125
    training_log_period: 50
    alert_after_folds: 3
    alert_relative_degradation: 0.25
  outputs:
    search_root_dir: artifacts/catboost/search/round2_phase1
selected_features:
- load_seasonal_how_30d_mean
- load_seasonal_how_15d_mean
- month
- load_seasonal_daytype_8d_q90
- load_seasonal_how_15d_count
- load_seasonal_daytype_8d_q75
- load_yoy_ratio_365d
- seasonal_day_sin
- temperature_clim_15d_q10
- temperature_recent_std_7d
- load_seasonal_daytype_8d_q25
- load_seasonal_daytype_8d_q50_scaled_28d
- load_seasonal_how_15d_std
- temperature_clim_15d_hdd65
- load_seasonal_how_30d_std
- temperature_clim_15d_q90
- hour
categorical_features:
- hour
- month
